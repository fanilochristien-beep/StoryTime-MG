<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanilo Christien R.</title>
</head>
<body>
    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
        }

        header{
            background: linear-gradient(90deg, #2563eb, #9333ea);
            padding: 20px;
            text-align: center;
        }

        header h1{
            margin: 0;
            font-size: 28px;
        }

        nav{
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #020617;
            padding: 10px;
        }

        nav a{
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container{
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card{
            background: #1e293b;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .video iframe{
            width: 100%;
            height: 400px;
            border-radius: 10px;
        }

        footer{
            text-align: center;
            padding: 20px;
            background: #020617;
            margin-top: 40px;
            font-size: 14px;
            color: #94a3b8;
        }

        button{
            background: #2563eb;
            border: none;
            padding: 10px 15px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover{
            background: #1d4ed8;
        }
    </style>

    <header>
        <h1>StoryTime MG</h1>
        <p>Tantara • Vidéo • Animation</p>
    </header>

    <nav>
        <a href="#">Acceuil</a>
        <a href="#story">Tantara</a>
        <a href="#video">Vidéo</a>
        <a href="#animation">Animation</a>
    </nav>

    <div class="container">

        <div class="card" id="story">
            <h2>Story Time MG</h2>
            <p><strong>Episode 1</strong>/p>
            <button>Tohiny</button>
        </div>

        <div class="card video" id="video">
            <h2>Vidéo</h2>
            <iframe src="www.facebook.com" frameborder="0"></iframe>
        </div>

        <div class="card" id="animation">
            <p>Ahoana no anaovana animation vidéo?</p>
            <button>Hijery</button>
        </div>
    </div>

    <footer>
        © 2026 StoryTime MG • Tous droits réservés
    </footer>
</body>
</html>
